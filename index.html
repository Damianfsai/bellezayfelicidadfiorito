<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta charset="UTF-8">
<title>AR PRO STABLE</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }
#overlay {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
button { padding:20px; font-size:18px; border-radius:20px; }
</style>

</head>

<body>

<div id="overlay">
<button id="startButton">INICIAR</button>
</div>

<a-scene
mindar-image="imageTargetSrc: ./targets.mind; maxTrack:1; filterBeta:0.25; filterMinCF:0.02"
renderer="colorManagement:true"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false"
>

<a-assets>
<video id="vid0" preload="metadata" muted playsinline crossorigin="anonymous"></video>
</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity mindar-image-target="targetIndex:0">
    <a-entity id="lockContainer">
        <a-video src="#vid0" width="3" height="5"></a-video>
    </a-entity>
</a-entity>

</a-scene>

<script>

// 🔥 STICKY LOCK (ANTI FLICK REAL)
AFRAME.registerComponent('sticky-lock', {
    init: function () {
        this.lastStablePos = new THREE.Vector3();
        this.lastStableQuat = new THREE.Quaternion();
        this.stability = 0;
    },

    tick: function () {
        const parent = this.el.parentElement;
        if (!parent.object3D.visible) return;

        const currentPos = parent.object3D.position;
        const currentQuat = parent.object3D.quaternion;

        // medir movimiento
        const dist = this.lastStablePos.distanceTo(currentPos);

        if (dist < 0.01) {
            this.stability++;
        } else {
            this.stability = 0;
        }

        // si estable → actualizar
        if (this.stability > 5) {
            this.lastStablePos.lerp(currentPos, 0.2);
            this.lastStableQuat.slerp(currentQuat, 0.2);
        }

        // aplicar SIEMPRE la versión estable
        this.el.object3D.position.copy(this.lastStablePos);
        this.el.object3D.quaternion.copy(this.lastStableQuat);
    }
});

// aplicar componente
document.querySelector('#lockContainer').setAttribute('sticky-lock','');

const video = document.querySelector("#vid0");
const sceneEl = document.querySelector("a-scene");

const SRC = "https://res.cloudinary.com/dnsy0ccg8/video/upload/v1772938685/1_COMEDOR_GOURMET_REPARTO_TUPPERS_480_hxse1v.mp4";

document.getElementById("startButton").onclick = async () => {

    document.getElementById("overlay").style.display = "none";

    video.src = SRC;
    video.load();

    await sceneEl.systems["mindar-image-system"].start();
};

const target = document.querySelector('[mindar-image-target]');

target.addEventListener("targetFound", async () => {

    video.muted = false;

    try {
        await video.play();
    } catch(e){}

});

target.addEventListener("targetLost", () => {

    video.pause();
    video.currentTime = 0;
    video.muted = true;

});

</script>

</body>
</html>
